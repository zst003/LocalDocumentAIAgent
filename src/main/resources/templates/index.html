<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公安文档AI智能体</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', Roboto, Helvetica, Arial, sans-serif;
            background: #e8edf2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .chat-header {
            background: #ffffff;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #e8edf2;
        }

        .chat-header .avatar {
            width: 36px;
            height: 36px;
            background: #1a5c3e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .chat-header .info h1 {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 2px;
        }

        .chat-header .info p {
            font-size: 12px;
            color: #6b7280;
        }

        .header-buttons {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: transparent;
            border: none;
            color: #6b7280;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: #f3f4f6;
            color: #1f2937;
        }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafbfc;
        }

        .message {
            display: flex;
            margin-bottom: 20px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        /* 助手头像 - 在左边 */
        .message.assistant .message-avatar {
            background: #e8edf2;
            color: #1a5c3e;
            margin-right: 10px;
            margin-left: 0;
        }

        /* 用户头像 - 在右边（使用 order 调整顺序） */
        .message.user .message-avatar {
            background: #e8edf2;
            color: #6b7280;
            margin-left: 10px;
            margin-right: 0;
            order: 2;  /* 关键：让头像排在内容后面 */
        }

        /* 用户消息的内容区域 - 让内容在头像左边 */
        .message.user .message-content {
            order: 1;
        }

        .message-content {
            max-width: 80%;
        }

        /* 消息气泡 - 极简风格 */
        .message-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #1a5c3e;
            color: white;
        }

        .message.assistant .message-bubble {
            background: white;
            color: #374151;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
        }

        /* 简洁的回复格式 */
        .reply-header {
            margin-bottom: 8px;
        }

        .reply-header .title {
            font-size: 14px;
            font-weight: 600;
            color: #1a5c3e;
        }

        .match-row {
            background: #f3f4f6;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #6b7280;
            margin: 6px 0 8px 0;
        }

        .answer-text {
            color: #374151;
            line-height: 1.6;
            margin: 8px 0;
        }

        .topics-row {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #f0f0f0;
        }

        .topics-label {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        .topic-tag {
            display: inline-block;
            background: #f3f4f6;
            color: #6b7280;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 12px;
            margin: 0 6px 6px 0;
            transition: all 0.2s;
            cursor: pointer;  /* 添加手指光标 */
        }

        .topic-tag:hover {
            background: #e5e7eb;
            cursor: pointer;
            transform: translateY(-1px);  /* 轻微上浮效果 */
        }

        .message-time {
            font-size: 10px;
            color: #9ca3af;
            margin-top: 4px;
            margin-left: 4px;
        }

        .message.user .message-time {
            text-align: right;
            margin-right: 4px;
        }

        /* 输入区域 */
        .chat-input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e8edf2;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            transition: all 0.2s;
        }

        .chat-input:focus {
            border-color: #1a5c3e;
            box-shadow: 0 0 0 2px rgba(26, 92, 62, 0.1);
        }

        .send-btn {
            padding: 10px 20px;
            background: #1a5c3e;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: #0e3d2a;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 打字动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #9ca3af;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        .typing-text {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e8edf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
        }
        .modal-body {
            padding: 20px;
            line-height: 1.6;
            font-size: 14px;
            color: #374151;
            white-space: pre-wrap;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #9ca3af;
        }

        /* 滚动条 */
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 3px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">
            <i class="fas fa-balance-scale"></i>
        </div>
        <div class="info">
            <h1>警务文档智能助手</h1>
            <p>基于本地文档的智能问答</p>
        </div>
        <div class="header-buttons">
            <button class="header-btn" onclick="showKBManager()">
                <i class="fas fa-database"></i> 知识库
            </button>
            <button class="header-btn" onclick="uploadFile()">
                <i class="fas fa-file-upload"></i> 上传文档
            </button>
            <button class="header-btn" onclick="uploadFolder()">
                <i class="fas fa-folder-open"></i> 上传文件夹
            </button>
            <button class="header-btn" onclick="showSummary()">
                <i class="fas fa-file-alt"></i> 总结
            </button>
            <button class="header-btn" onclick="clearChat()">
                <i class="fas fa-trash-alt"></i> 清空
            </button>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
            <div class="message-avatar"><i class="fas fa-balance-scale"></i></div>
            <div class="message-content">
                <div class="message-bubble">
                    您好！我是警务文档智能助手，已加载公安工作相关文档。<br><br>
                    您可以直接输入问题，我会基于文档内容为您查找答案。
                </div>
                <div class="message-time" id="welcomeTime"></div>
            </div>
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" class="chat-input" id="questionInput"
               placeholder="输入问题，例如：吸毒人员如何管理？"
               onkeypress="if(event.keyCode==13) sendMessage()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i> 发送
        </button>
    </div>
</div>

<div class="modal" id="summaryModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-file-alt"></i>文档总结</h3>
            <button class="close-modal" onclick="closeSummary()">&times;</button>
        </div>
        <div class="modal-body" id="summaryContent">加载中...</div>
    </div>
</div>

<script>
    function formatTime() {
        const now = new Date();
        return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    }
    document.getElementById('welcomeTime').innerText = formatTime();

    // 格式化回复 - 简洁风格（话题标签可点击）
    function formatReply(content) {
        if (!content) return '';

        let text = content;

        // 移除所有 ** 标记
        text = text.replace(/\*\*/g, '');

        // 提取匹配度
        let matchRate = '';
        const matchMatch = text.match(/匹配度[：:]\s*([\d.]+%)/);
        if (matchMatch) matchRate = matchMatch[1];

        // 提取答案
        let answerText = '';
        const answerMatch = text.match(/回答[：:]\s*([^\n]+(?:\n(?!相关话题|匹配度)[^\n]*)*)/i);
        if (answerMatch) {
            answerText = answerMatch[1].trim();
            const topicIdx = answerText.indexOf('相关话题');
            if (topicIdx > 0) answerText = answerText.substring(0, topicIdx).trim();
        }

        if (!answerText) {
            let cleanText = text.replace(/找到相关答案/i, '').replace(/匹配度[：:][^\n]*\n/, '');
            answerText = cleanText.split('相关话题')[0].trim();
        }

        // 提取相关话题 - 添加点击事件
        let topicsHtml = '';
        const topicsMatch = text.match(/相关话题[：:]\s*([\s\S]*?)$/i);
        if (topicsMatch) {
            let topicsRaw = topicsMatch[1];
            const topicItems = topicsRaw.match(/[-•]\s*([^\n-•][^\n]{0,100})/g);
            if (topicItems) {
                const topics = topicItems.map(item => {
                    let topic = item.replace(/^[-•]\s*/, '').trim();
                    if (topic.length > 0 && topic.length < 100) {
                        // 添加 onclick 事件，点击后自动搜索
                        const escapedTopic = escapeHtml(topic);
                        return `<span class="topic-tag" onclick="searchTopic('${escapeHtml(topic).replace(/'/g, "\\'")}')">${escapedTopic}</span>`;
                    }
                    return '';
                }).filter(t => t);
                if (topics.length > 0) {
                    topicsHtml = `
                        <div class="topics-row">
                            <div class="topics-label">相关内容</div>
                            <div>${topics.join('')}</div>
                        </div>
                    `;
                }
            }
        }

        // 构建最终HTML
        let html = `<div class="reply-header"><div class="title">查询结果</div></div>`;

        if (answerText) {
            html += `<div class="answer-text">${escapeHtml(answerText).replace(/\n/g, '<br>')}</div>`;
        }

        if (topicsHtml) {
            html += topicsHtml;
        }

        if (!answerText && !matchRate) {
            html = `<div class="reply-header"><div class="title">回答</div></div><div class="answer-text">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
        }
        return html;
    }

    // 点击话题标签时触发的搜索函数
    async function searchTopic(topic) {
        if (!topic) return;

        // 显示用户点击的问题
        addMessage(topic, true);

        // 显示正在输入状态
        showTyping();

        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = true;

        try {
            const formData = new FormData();
            formData.append('question', topic);
            const response = await fetch('/api/ask', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            hideTyping();
            addMessage(result.message || '未找到相关内容', false);
        } catch (error) {
            hideTyping();
            addMessage('网络错误，请稍后重试', false);
        } finally {
            sendBtn.disabled = false;
            document.getElementById('questionInput').focus();
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function addMessage(content, isUser) {
        const messagesDiv = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

        const avatarIcon = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-shield-alt"></i>';
        let formattedContent = isUser ? escapeHtml(content).replace(/\n/g, '<br>') : formatReply(content);

        messageDiv.innerHTML = `
            <div class="message-avatar">${avatarIcon}</div>
            <div class="message-content">
                <div class="message-bubble">${formattedContent}</div>
                <div class="message-time">${formatTime()}</div>
            </div>
        `;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTyping() {
        const messagesDiv = document.getElementById('chatMessages');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="message-avatar"><i class="fas fa-shield-alt"></i></div>
            <div class="message-content">
                <div class="message-bubble">
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                    <div class="typing-text">正在查找...</div>
                </div>
            </div>
        `;
        messagesDiv.appendChild(typingDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    async function sendMessage() {
        const input = document.getElementById('questionInput');
        const question = input.value.trim();
        if (!question) return;

        addMessage(question, true);
        input.value = '';
        showTyping();

        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = true;

        try {
            const formData = new FormData();
            formData.append('question', question);
            const response = await fetch('/api/ask', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            hideTyping();
            addMessage(result.message || '未找到相关内容', false);
        } catch (error) {
            hideTyping();
            addMessage('网络错误，请稍后重试', false);
        } finally {
            sendBtn.disabled = false;
            input.focus();
        }
    }

    async function showSummary() {
        const modal = document.getElementById('summaryModal');
        const content = document.getElementById('summaryContent');
        modal.style.display = 'flex';
        content.innerHTML = '<span style="color:#9ca3af;">正在生成总结...</span>';

        try {
            const response = await fetch('/api/summary');
            const result = await response.json();
            if (result.success) {
                let text = result.message.replace(/\n/g, '<br>').replace(/\*\*/g, '');
                text = text.replace(/【(.+?)】/g, '<strong>【$1】</strong>');
                content.innerHTML = text;
            } else {
                content.innerHTML = '<span style="color:#dc2626;">' + result.message + '</span>';
            }
        } catch (error) {
            content.innerHTML = '<span style="color:#dc2626;">获取失败</span>';
        }
    }

    function closeSummary() {
        document.getElementById('summaryModal').style.display = 'none';
    }

    function clearChat() {
        const messagesDiv = document.getElementById('chatMessages');
        messagesDiv.innerHTML = `
            <div class="message assistant">
                <div class="message-avatar"><i class="fas fa-shield-alt"></i></div>
                <div class="message-content">
                    <div class="message-bubble">对话已清空，有什么可以帮您？</div>
                    <div class="message-time">${formatTime()}</div>
                </div>
            </div>
        `;
    }

    document.getElementById('summaryModal').onclick = function(e) {
        if (e.target === this) closeSummary();
    };

    document.getElementById('questionInput').focus();
    // 上传单个文件
    function uploadFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.txt';
        input.onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            addMessage(`📤 正在上传: ${file.name}`, false);
            showTyping();

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                hideTyping();
                addMessage(result.message, false);
            } catch (error) {
                hideTyping();
                addMessage('上传失败: ' + error.message, false);
            }
        };
        input.click();
    }
    // 显示知识库管理界面
    function showKBManager() {
        // 可以弹窗显示当前知识库中的文件列表
        fetch('/api/kb-info')
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    let message = `📚 知识库信息\n`;
                    message += `目录: ${data.directory}\n`;
                    message += `文件数: ${data.fileCount}\n`;
                    message += `总大小: ${(data.totalSize / 1024).toFixed(2)} KB\n`;
                    if (data.sentenceCount) {
                        message += `句子数: ${data.sentenceCount}\n\n`;
                    }
                    message += `📄 文件列表:\n`;
                    data.files.forEach(f => {
                        message += `  • ${f.name} (${(f.size / 1024).toFixed(2)} KB)\n`;
                    });
                    alert(message);
                } else {
                    alert('获取失败: ' + data.message);
                }
            });
    }
    // 上传文件夹（需要先压缩成zip）
    function uploadFolder() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.zip';
        input.onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            addMessage(`📁 正在上传文件夹压缩包: ${file.name}`, false);
            showTyping();

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload-folder', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                hideTyping();
                addMessage(result.message, false);
            } catch (error) {
                hideTyping();
                addMessage('上传失败: ' + error.message, false);
            }
        };
        input.click();
    }
</script>
</body>
</html>
